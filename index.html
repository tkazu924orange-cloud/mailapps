<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mail</title>
    <!-- iPhone用アプリ化設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --ios-blue: #007aff;
            --bg-gray: #f2f2f7;
            --border-gray: #e5e5ea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: #000;
            user-select: none;
        }
        /* ヘッダー */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-gray);
            padding: 16px;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }
        .header .subtitle {
            color: var(--ios-blue);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* メールリスト */
        .mail-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .mail-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-gray);
            cursor: pointer;
            background-color: white;
            transition: background-color 0.2s;
        }
        .mail-item:active {
            background-color: #e5e5ea;
        }
        .mail-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }
        .sender {
            font-weight: 600;
            font-size: 16px;
        }
        .date {
            color: #8e8e93;
            font-size: 14px;
        }
        .subject {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            color: #000;
        }
        .preview {
            color: #8e8e93;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 詳細画面（ポップアップ風） */
        .detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 20;
            display: flex;
            flex-direction: column;
        }
        .detail-view.active {
            transform: translateX(0);
        }
        .detail-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-gray);
            display: flex;
            align-items: center;
            background: var(--bg-gray);
        }
        .back-btn {
            color: var(--ios-blue);
            background: none;
            border: none;
            font-size: 17px;
            cursor: pointer;
            padding: 0;
            font-weight: 500;
        }
        .detail-body {
            padding: 20px 16px;
            overflow-y: auto;
            flex: 1;
        }
        .detail-subject {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .detail-meta {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 10px;
        }
        .detail-content {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap; /* 改行を有効にする */
        }
    </style>
</head>
<body>

    <!-- メイン画面（リスト） -->
    <div class="header">
        <h1>受信箱</h1>
        <div class="subtitle">すべて 📥</div>
    </div>
    
    <ul class="mail-list" id="mailList">
        <!-- JSでここにメールが追加されます -->
    </ul>

    <!-- 詳細画面 -->
    <div class="detail-view" id="detailView">
        <div class="detail-header">
            <button class="back-btn" onclick="closeDetail()">◀ 受信箱</button>
        </div>
        <div class="detail-body">
            <div class="detail-subject" id="detailSubject">件名</div>
            <div class="detail-meta">
                差出人: <span id="detailSender" style="color:#000; font-weight:500;"></span><br>
                日付: <span id="detailDate"></span>
            </div>
            <div class="detail-content" id="detailContent">本文</div>
        </div>
    </div>

        // リストを生成して表示する関数
        function renderMailList() {
            const listEl = document.getElementById('mailList');
            listEl.innerHTML = ''; // 初期化

            mockMails.forEach(mail => {
                const li = document.createElement('li');
                li.className = 'mail-item';
                li.onclick = () => openDetail(mail.id);
                li.innerHTML = `
                    <div class="mail-top">
                        <span class="sender">${mail.sender}</span>
                        <span class="date">${mail.date}</span>
                    </div>
                    <div class="subject">${mail.subject}</div>
                    <div class="preview">${mail.preview}</div>
                `;
                listEl.appendChild(li);
            });
        }

        // 詳細画面を開く
        function openDetail(id) {
            const mail = mockMails.find(m => m.id === id);
            if (!mail) return;

            document.getElementById('detailSubject').innerText = mail.subject;
            document.getElementById('detailSender').innerText = mail.sender;
            document.getElementById('detailDate').innerText = mail.date;
            document.getElementById('detailContent').innerText = mail.content;

            document.getElementById('detailView').classList.add('active');
        }

        // 詳細画面を閉じる
        function closeDetail() {
            document.getElementById('detailView').classList.remove('active');
        }

        // アプリ起動時にリストを表示
        renderMailList();
    </script>
</body>
</html>
