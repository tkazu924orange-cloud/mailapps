    <style>
        :root {
            --ios-blue: #007aff;
            --ios-orange: #ff9500;
            --bg-gray: #f2f2f7;
            --border-gray: #e5e5ea;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Hiragino Kaku Gothic ProN, sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: #000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* ヘッダー */
        .header {
            position: sticky; top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-gray);
            padding: 16px; padding-top: calc(16px + env(safe-area-inset-top));
            z-index: 10;
        }
        .header h1 { margin: 0; font-size: 28px; font-weight: 700; }
        .header .subtitle { color: var(--ios-blue); font-size: 14px; margin-top: 4px; font-weight: 500; }

        /* メールリスト */
        .mail-list { list-style: none; margin: 0; padding: 0; }
        .mail-item {
            display: flex; align-items: flex-start;
            padding: 12px 16px; border-bottom: 1px solid var(--border-gray);
            background-color: white;
        }
        .mail-item:active { background-color: #e5e5ea; }
        .unread-dot {
            width: 10px; height: 10px; background-color: var(--ios-blue);
            border-radius: 50%; margin-top: 6px; margin-right: 8px;
            flex-shrink: 0; opacity: 0;
        }
        .mail-item.unread .unread-dot { opacity: 1; }
        .mail-content-area { flex: 1; cursor: pointer; min-width: 0; }
        .mail-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .sender { font-weight: 600; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mail-item.unread .sender { font-weight: 800; }
        .date { color: #8e8e93; font-size: 14px; flex-shrink: 0; margin-left: 8px; }
        .subject { font-weight: 500; font-size: 14px; margin-bottom: 4px; color: #000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .preview { color: #8e8e93; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .star-btn { background: none; border: none; font-size: 18px; color: #c7c7cc; cursor: pointer; padding: 4px 0 4px 8px; }
        .star-btn.active { color: var(--ios-orange); }

        /* 詳細画面 */
        .detail-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 20; display: flex; flex-direction: column;
        }
        .detail-view.active { transform: translateX(0); }
        .detail-header { padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-gray); background: var(--bg-gray); }
        .back-btn { color: var(--ios-blue); background: none; border: none; font-size: 17px; font-weight: 500; padding: 0; cursor: pointer; }
        .detail-body { padding: 20px 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); overflow-y: auto; flex: 1; }
        .detail-subject { font-size: 20px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .detail-meta { font-size: 13px; color: #8e8e93; margin-bottom: 16px; border-bottom: 1px solid var(--border-gray); padding-bottom: 12px; line-height: 1.6; }
        .detail-content { font-size: 15px; line-height: 1.5; color: #333; }
    </style>
</head>

                        </div>
                        <div class="subject">${mail.subject}</div>
                        <div class="preview">${mail.preview}</div>
                    </div>
                    <button class="star-btn ${mail.isStarred ? 'active' : ''}" onclick="toggleStar(${mail.id}, event)">
                        ${mail.isStarred ? '★' : '☆'}
                    </button>
                `;
                listEl.appendChild(li);
            });
        }

        function toggleStar(id, event) {
            event.stopPropagation();
            const mail = mockMails.find(m => m.id === id);
            if (mail) {
                mail.isStarred = !mail.isStarred;
                renderMailList();
            }
        }

        function openDetail(id) {
            const mail = mockMails.find(m => m.id === id);
            if (!mail) return;
            mail.isUnread = false;
            renderMailList();
            document.getElementById('detailSubject').innerText = mail.subject;
            document.getElementById('detailSender').innerText = mail.sender;
            document.getElementById('detailDate').innerText = mail.date;
            document.getElementById('detailContent').innerHTML = mail.content;
            document.getElementById('detailView').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailView').classList.remove('active');
        }

        renderMailList();
    </script>
</body>
</html>
